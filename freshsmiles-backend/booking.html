<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Smiles Dental — Book an Appointment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F8F6;
    --card: #FFFFFF;
    --ink: #14261F;
    --ink-soft: #4B5D55;
    --teal: #167567;
    --teal-light: #E3F0EA;
    --gold: #D9A441;
    --gold-dark: #A9791F;
    --border: #DCE4DF;
    --error: #B3432F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    padding: 32px 16px 64px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 32px; }
  header .eyebrow {
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--teal);
    font-weight: 600;
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 32px;
    margin: 0 0 8px;
  }
  header p { color: var(--ink-soft); margin: 0; font-size: 15px; }

  .steps {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--ink-soft);
  }
  .step-dot.active { background: var(--teal); border-color: var(--teal); color: white; }
  .step-dot.done { background: var(--teal-light); border-color: var(--teal); color: var(--teal); }
  .step-line { width: 32px; height: 1.5px; background: var(--border); align-self: center; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  .card h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    margin: 0 0 20px;
  }

  .date-grid, .time-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }
  .pick-btn {
    padding: 12px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    text-align: center;
    transition: all 0.12s ease;
  }
  .pick-btn:hover { border-color: var(--teal); }
  .pick-btn.selected { background: var(--teal); border-color: var(--teal); color: white; }
  .pick-btn.taken { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }
  .pick-btn .sub { display: block; font-size: 11px; color: inherit; opacity: 0.7; margin-top: 2px; }

  label { display: block; font-size: 13px; font-weight: 500; margin: 16px 0 6px; color: var(--ink-soft); }
  input[type=text], input[type=tel], input[type=email], textarea {
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
  }
  input:focus, textarea:focus { outline: none; border-color: var(--teal); }
  textarea { resize: vertical; min-height: 70px; }

  .actions { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  button.primary, button.ghost {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 12px 22px;
    border-radius: 10px;
    cursor: pointer;
    border: none;
  }
  button.primary { background: var(--gold); color: #3A2A08; }
  button.primary:hover { background: var(--gold-dark); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost { background: transparent; border: 1.5px solid var(--border); color: var(--ink-soft); }
  button.ghost:hover { border-color: var(--ink-soft); }

  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .label { color: var(--ink-soft); }

  .confirm-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--teal-light); color: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }

  .note { font-size: 13px; color: var(--ink-soft); margin-top: 20px; padding: 12px 14px; background: var(--teal-light); border-radius: 10px; }

  .office-link { text-align: center; margin-top: 28px; }
  .office-link a { color: var(--ink-soft); font-size: 13px; text-decoration: underline; cursor: pointer; }

  .office-panel { margin-top: 16px; }
  .booking-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; font-size: 14px; }
  .booking-row .when { font-weight: 600; }
  .booking-row .who { color: var(--ink-soft); }
  .empty-state { text-align: center; color: var(--ink-soft); padding: 24px; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Fresh Smiles Dental</div>
    <h1>Book your appointment</h1>
    <p>Ridgewood, Queens — pick a time that works for you</p>
  </header>

  <div class="steps" id="stepDots"></div>

  <div class="card" id="cardArea"></div>

  <div class="office-link">
    <a id="toggleOffice">Staff view: see all upcoming bookings</a>
  </div>
  <div class="office-panel" id="officePanel" style="display:none;"></div>
</div>

<script>
const STORAGE_KEY_PREFIX = 'freshsmiles:booking:';
const state = {
  step: 1,
  date: null,
  time: null,
  name: '',
  phone: '',
  email: '',
  reason: ''
};

function getNextWeekdays(count) {
  const days = [];
  let d = new Date();
  d.setDate(d.getDate() + 1);
  while (days.length < count) {
    const day = d.getDay();
    if (day !== 0 && day !== 6) {
      days.push(new Date(d));
    }
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function formatDateKey(d) {
  return d.toISOString().slice(0, 10);
}

function formatDateLabel(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

const TIME_SLOTS = ['9:00 AM','10:00 AM','11:00 AM','1:00 PM','2:00 PM','3:00 PM','4:00 PM'];

const API_BASE = 'https://freshsmiles-backend.onrender.com';

async function getBookingsForDate(dateKey) {
  try {
    const res = await fetch(`${API_BASE}/api/bookings/${dateKey}`);
    if (!res.ok) throw new Error('backend error');
    return await res.json();
  } catch (e) {
    try {
      const result = await window.storage.get(STORAGE_KEY_PREFIX + dateKey, true);
      return result ? JSON.parse(result.value) : [];
    } catch (e2) {
      return [];
    }
  }
}

async function saveBooking(dateKey, booking) {
  try {
    const res = await fetch(`${API_BASE}/api/bookings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: dateKey, ...booking })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not save booking.');
    return data;
  } catch (e) {
    if (e.message && e.message !== 'Failed to fetch') throw e;
    const existing = await getBookingsForDate(dateKey);
    existing.push(booking);
    await window.storage.set(STORAGE_KEY_PREFIX + dateKey, JSON.stringify(existing), true);
  }
}

async function getAllUpcomingBookings() {
  try {
    const res = await fetch(`${API_BASE}/api/bookings`);
    if (!res.ok) throw new Error('backend error');
    const all = await res.json();
    return all.map(b => ({ ...b, dateKey: b.date, dateLabel: formatDateLabel(new Date(b.date + 'T00:00:00')) }));
  } catch (e) {
    const days = getNextWeekdays(14);
    let all = [];
    for (const d of days) {
      const key = formatDateKey(d);
      const bookings = await getBookingsForDate(key);
      bookings.forEach(b => all.push({ ...b, dateKey: key, dateLabel: formatDateLabel(d) }));
    }
    return all;
  }
}

function renderStepDots() {
  const dots = document.getElementById('stepDots');
  dots.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    if (i > 1) {
      const line = document.createElement('div');
      line.className = 'step-line';
      dots.appendChild(line);
    }
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (state.step === i ? ' active' : state.step > i ? ' done' : '');
    dot.textContent = state.step > i ? '✓' : i;
    dots.appendChild(dot);
  }
}

async function renderCard() {
  renderStepDots();
  const card = document.getElementById('cardArea');

  if (state.step === 1) {
    const days = getNextWeekdays(10);
    card.innerHTML = '<h2>Choose a date</h2><div class="date-grid" id="dateGrid"></div>';
    const grid = document.getElementById('dateGrid');
    days.forEach(d => {
      const key = formatDateKey(d);
      const btn = document.createElement('div');
      btn.className = 'pick-btn' + (state.date === key ? ' selected' : '');
      btn.innerHTML = formatDateLabel(d);
      btn.onclick = () => { state.date = key; state.step = 2; renderCard(); };
      grid.appendChild(btn);
    });
  }

  else if (state.step === 2) {
    const bookings = await getBookingsForDate(state.date);
    const takenTimes = bookings.map(b => b.time);
    const dateObj = new Date(state.date + 'T00:00:00');
    card.innerHTML = '<h2>Choose a time — ' + formatDateLabel(dateObj) + '</h2><div class="time-grid" id="timeGrid"></div>' +
      '<div class="actions"><button class="ghost" id="backBtn">Back</button><span></span></div>';
    const grid = document.getElementById('timeGrid');
    TIME_SLOTS.forEach(t => {
      const isTaken = takenTimes.includes(t);
      const btn = document.createElement('div');
      btn.className = 'pick-btn' + (state.time === t ? ' selected' : '') + (isTaken ? ' taken' : '');
      btn.textContent = t;
      if (!isTaken) {
        btn.onclick = () => { state.time = t; state.step = 3; renderCard(); };
      }
      grid.appendChild(btn);
    });
    document.getElementById('backBtn').onclick = () => { state.step = 1; renderCard(); };
  }

  else if (state.step === 3) {
    card.innerHTML = `
      <h2>Your details</h2>
      <label for="fName">Full name</label>
      <input type="text" id="fName" placeholder="Jane Rivera" value="${state.name}">
      <label for="fPhone">Phone number</label>
      <input type="tel" id="fPhone" placeholder="(347) 555-0134" value="${state.phone}">
      <label for="fEmail">Email</label>
      <input type="email" id="fEmail" placeholder="jane@email.com" value="${state.email}">
      <label for="fReason">Reason for visit (optional)</label>
      <textarea id="fReason" placeholder="e.g. tooth pain, routine checkup">${state.reason}</textarea>
      <div class="actions">
        <button class="ghost" id="backBtn">Back</button>
        <button class="primary" id="reviewBtn">Review booking</button>
      </div>
    `;
    document.getElementById('backBtn').onclick = () => { state.step = 2; renderCard(); };
    document.getElementById('reviewBtn').onclick = () => {
      state.name = document.getElementById('fName').value.trim();
      state.phone = document.getElementById('fPhone').value.trim();
      state.email = document.getElementById('fEmail').value.trim();
      state.reason = document.getElementById('fReason').value.trim();
      if (!state.name || !state.phone) {
        alert('Please enter at least your name and phone number.');
        return;
      }
      state.step = 4;
      renderCard();
    };
  }

  else if (state.step === 4) {
    const dateObj = new Date(state.date + 'T00:00:00');
    card.innerHTML = `
      <h2>Confirm your appointment</h2>
      <div class="summary-row"><span class="label">Date</span><span>${formatDateLabel(dateObj)}</span></div>
      <div class="summary-row"><span class="label">Time</span><span>${state.time}</span></div>
      <div class="summary-row"><span class="label">Name</span><span>${state.name}</span></div>
      <div class="summary-row"><span class="label">Phone</span><span>${state.phone}</span></div>
      <div class="summary-row"><span class="label">Email</span><span>${state.email || '—'}</span></div>
      <div class="summary-row"><span class="label">Reason</span><span>${state.reason || '—'}</span></div>
      <div class="actions">
        <button class="ghost" id="backBtn">Back</button>
        <button class="primary" id="confirmBtn">Confirm booking</button>
      </div>
    `;
    document.getElementById('backBtn').onclick = () => { state.step = 3; renderCard(); };
    document.getElementById('confirmBtn').onclick = async () => {
      const btn = document.getElementById('confirmBtn');
      btn.disabled = true;
      btn.textContent = 'Booking...';
      try {
        await saveBooking(state.date, {
          time: state.time,
          name: state.name,
          phone: state.phone,
          email: state.email,
          reason: state.reason,
          bookedAt: new Date().toISOString()
        });
        state.step = 5;
        renderCard();
      } catch (e) {
        alert(e.message || 'Something went wrong saving your booking. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Confirm booking';
      }
    };
  }

  else if (state.step === 5) {
    const dateObj = new Date(state.date + 'T00:00:00');
    card.innerHTML = `
      <div class="confirm-icon">✓</div>
      <h2 style="text-align:center;">You're all set, ${state.name.split(' ')[0]}</h2>
      <div class="summary-row"><span class="label">Date</span><span>${formatDateLabel(dateObj)}</span></div>
      <div class="summary-row"><span class="label">Time</span><span>${state.time}</span></div>
      <div class="note">
        A confirmation would normally be sent to ${state.phone} and ${state.email || 'your email'} automatically.
        That connection isn't wired up yet in this prototype — see notes below.
      </div>
      <div class="actions" style="justify-content:center;">
        <button class="ghost" id="newBookingBtn">Book another appointment</button>
      </div>
    `;
    document.getElementById('newBookingBtn').onclick = () => {
      state.step = 1; state.date = null; state.time = null;
      state.name = ''; state.phone = ''; state.email = ''; state.reason = '';
      renderCard();
    };
  }
}

document.getElementById('toggleOffice').onclick = async () => {
  const panel = document.getElementById('officePanel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
  if (isHidden) {
    panel.innerHTML = '<div class="empty-state">Loading bookings...</div>';
    const bookings = await getAllUpcomingBookings();
    bookings.sort((a, b) => (a.dateKey + a.time).localeCompare(b.dateKey + b.time));
    if (bookings.length === 0) {
      panel.innerHTML = '<div class="empty-state">No upcoming bookings yet.</div>';
    } else {
      panel.innerHTML = bookings.map(b => `
        <div class="booking-row">
          <div>
            <div class="when">${b.dateLabel} · ${b.time}</div>
            <div class="who">${b.name} — ${b.phone}</div>
          </div>
        </div>
      `).join('');
    }
  }
};

renderCard();
</script>
</body>
</html>
