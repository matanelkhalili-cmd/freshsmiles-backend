<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Smiles Dental</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F8F6;
    --card: #FFFFFF;
    --ink: #14261F;
    --ink-soft: #4B5D55;
    --teal: #167567;
    --teal-light: #E3F0EA;
    --gold: #D9A441;
    --border: #DCE4DF;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; padding: 48px 16px 64px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 40px; }
  header img.logo { width: 96px; height: 96px; object-fit: contain; margin-bottom: 12px; }
  header .eyebrow { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--teal); font-weight: 600; margin-bottom: 8px; }
  header h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 36px; margin: 0 0 10px; }
  header p { color: var(--ink-soft); margin: 0; font-size: 16px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
  .tile {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 24px; text-decoration: none; color: inherit; display: block;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .tile:hover { border-color: var(--teal); transform: translateY(-2px); }
  .tile .icon { width: 44px; height: 44px; border-radius: 12px; background: var(--teal-light); color: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 16px; font-weight: 600; }
  .tile h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 19px; margin: 0 0 6px; }
  .tile p { color: var(--ink-soft); font-size: 14px; margin: 0; line-height: 1.5; }

  .staff-link { text-align: center; margin-top: 40px; }
  .staff-link a { color: var(--ink-soft); font-size: 13px; text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="logo" src="logo.png" alt="Fresh Smiles Dental logo">
    <div class="eyebrow">Fresh Smiles Dental</div>
    <h1>Ridgewood, Queens</h1>
    <p>Book, pay, or check in — pick what you need below</p>
  </header>

  <div class="grid">
    <a class="tile" href="booking.html">
      <div class="icon">&#128197;</div>
      <h2>Book an appointment</h2>
      <p>Pick a date and time that works for you.</p>
    </a>
    <a class="tile" href="checkin.html">
      <div class="icon">&#10003;</div>
      <h2>Check in</h2>
      <p>Arrived for your appointment? Let us know.</p>
    </a>
    <a class="tile" href="billing.html">
      <div class="icon">&#128179;</div>
      <h2>Pay a balance</h2>
      <p>Enter your invoice ID to pay online.</p>
    </a>
  </div>
</div>
</body>
</html>
