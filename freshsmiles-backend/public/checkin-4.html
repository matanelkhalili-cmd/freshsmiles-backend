<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Smiles Dental — Check In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F8F6;
    --card: #FFFFFF;
    --ink: #14261F;
    --ink-soft: #4B5D55;
    --teal: #167567;
    --teal-light: #E3F0EA;
    --gold: #D9A441;
    --gold-dark: #A9791F;
    --border: #DCE4DF;
    --error: #B3432F;
    --error-light: #FBEAE7;
    --amber: #B3791F;
    --amber-light: #FBF0DA;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; padding: 32px 16px 64px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  header .eyebrow { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--teal); font-weight: 600; margin-bottom: 6px; }
  header h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 30px; margin: 0 0 8px; }
  header p { color: var(--ink-soft); margin: 0; font-size: 15px; }

  .tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 24px; background: var(--teal-light); border-radius: 12px; padding: 4px; max-width: 340px; margin-left: auto; margin-right: auto; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 9px; cursor: pointer; font-weight: 600; font-size: 14px; color: var(--ink-soft); }
  .tab.active { background: white; color: var(--teal); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .card h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; margin: 0 0 20px; }

  .name-btn {
    width: 100%; text-align: left; padding: 14px 16px; border-radius: 10px;
    border: 1.5px solid var(--border); background: white; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 15px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .name-btn:hover { border-color: var(--teal); }
  .name-btn .time { color: var(--ink-soft); font-size: 13px; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--ink-soft); font-size: 13px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  label { display: block; font-size: 13px; font-weight: 500; margin: 0 0 6px; color: var(--ink-soft); }
  input[type=text] { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1.5px solid var(--border); font-family: 'Inter', sans-serif; font-size: 15px; color: var(--ink); }
  input:focus { outline: none; border-color: var(--teal); }

  button.primary { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; padding: 12px 22px; border-radius: 10px; cursor: pointer; border: none; background: var(--gold); color: #3A2A08; width: 100%; margin-top: 14px; }
  button.primary:hover { background: var(--gold-dark); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; padding: 10px 16px; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--ink-soft); width: 100%; margin-top: 12px; }

  .confirm-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--teal-light); color: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
  .error-note { font-size: 13px; color: var(--error); margin-top: 12px; padding: 10px 14px; background: var(--error-light); border-radius: 10px; }
  .empty-state { text-align: center; color: var(--ink-soft); padding: 24px; font-size: 14px; }

  .arrived-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; }
  .arrived-row .name { font-weight: 600; font-size: 15px; }
  .arrived-row .meta { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .wait-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .wait-ok { background: var(--teal-light); color: var(--teal); }
  .wait-long { background: var(--amber-light); color: var(--amber); }
  .refresh-note { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Fresh Smiles Dental</div>
    <h1 id="pageTitle">Check in</h1>
    <p id="pageSub">Let us know you've arrived</p>
  </header>

  <div style="text-align:center; margin-bottom: 16px;"><a href="index.html" style="color: var(--ink-soft); font-size: 13px; text-decoration: underline;">← Back to home</a></div>

  <div class="tabs">
    <div class="tab active" id="patientTab">Patient</div>
    <div class="tab" id="staffTab">Staff — arrived list</div>
  </div>

  <div class="card" id="cardArea"></div>
</div>

<script>
const STORAGE_KEY_PREFIX = 'freshsmiles:booking:';
const API_BASE = 'https://freshsmiles-backend.onrender.com';
let currentTab = 'patient';
let staffRefreshInterval = null;

function todayKey() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

async function getTodayBookings() {
  try {
    const res = await fetch(`${API_BASE}/api/bookings/${todayKey()}`);
    if (!res.ok) throw new Error('backend error');
    return await res.json();
  } catch (e) {
    try {
      const result = await window.storage.get(STORAGE_KEY_PREFIX + todayKey(), true);
      return result ? JSON.parse(result.value) : [];
    } catch (e2) {
      return [];
    }
  }
}

async function checkInLocally(name) {
  if (typeof window.storage === 'undefined') {
    // window.storage only exists inside Claude.ai's own preview — it's not
    // a real fallback on the live, independently-hosted site. If we got
    // here, the real backend truly couldn't be reached, so say so plainly
    // instead of crashing on a missing API.
    throw new Error("Couldn't reach the front desk system. Please try again in a moment, or let the front desk know you've arrived.");
  }
  const bookings = await getTodayBookings();
  const normalized = name.trim().toLowerCase();
  let booking = bookings.find(b => b.name.trim().toLowerCase() === normalized);
  if (booking) {
    if (!booking.arrivedAt) booking.arrivedAt = new Date().toISOString();
  } else {
    booking = { time: 'Walk-in', name: name.trim(), phone: '', email: '', reason: '', bookedAt: new Date().toISOString(), arrivedAt: new Date().toISOString(), walkIn: true };
    bookings.push(booking);
  }
  await window.storage.set(STORAGE_KEY_PREFIX + todayKey(), JSON.stringify(bookings), true);
  return booking;
}

async function checkIn(name) {
  let res;
  try {
    res = await fetch(`${API_BASE}/api/bookings/${todayKey()}/checkin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
  } catch (networkErr) {
    // The request itself never reached the server (offline, blocked).
    return await checkInLocally(name);
  }
  let data;
  try {
    data = await res.json();
  } catch (parseErr) {
    // We got a response, but it wasn't valid JSON — this happens on Render's
    // free tier when the server is "waking up" from being idle and briefly
    // returns a gateway page instead of real JSON. Treat it the same as a
    // network failure rather than showing a cryptic parsing error.
    return await checkInLocally(name);
  }
  if (!res.ok) throw new Error(data.error || 'Could not check in.');
  return data;
}

function formatWait(arrivedAt) {
  const mins = Math.max(0, Math.round((Date.now() - new Date(arrivedAt).getTime()) / 60000));
  if (mins < 60) return mins + 'm';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + 'h ' + m + 'm';
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('patientTab').classList.toggle('active', tab === 'patient');
  document.getElementById('staffTab').classList.toggle('active', tab === 'staff');
  if (staffRefreshInterval) { clearInterval(staffRefreshInterval); staffRefreshInterval = null; }
  if (tab === 'patient') {
    document.getElementById('pageSub').textContent = "Let us know you've arrived";
    renderPatientView();
  } else {
    document.getElementById('pageSub').textContent = 'Live arrival list';
    renderStaffView();
    staffRefreshInterval = setInterval(renderStaffView, 15000);
  }
}
document.getElementById('patientTab').onclick = () => switchTab('patient');
document.getElementById('staffTab').onclick = () => switchTab('staff');

async function renderPatientView() {
  const card = document.getElementById('cardArea');
  card.innerHTML = '<div class="empty-state">Loading today\'s appointments...</div>';
  const bookings = await getTodayBookings();
  const waiting = bookings.filter(b => !b.arrivedAt);

  card.innerHTML = `
    <h2>Tap your name</h2>
    <div id="nameList"></div>
    <div class="divider">or</div>
    <label for="manualName">Type your name</label>
    <input type="text" id="manualName" placeholder="Full name">
    <button class="primary" id="manualCheckinBtn">Check in</button>
    <div id="checkinError"></div>
  `;

  const list = document.getElementById('nameList');
  if (waiting.length === 0) {
    list.innerHTML = '<div class="empty-state">No pending appointments right now — you can still check in below.</div>';
  } else {
    list.innerHTML = '';
    waiting.forEach(b => {
      const btn = document.createElement('div');
      btn.className = 'name-btn';
      btn.innerHTML = `<span>${b.name}</span><span class="time">${b.time}</span>`;
      btn.onclick = () => doCheckIn(b.name);
      list.appendChild(btn);
    });
  }

  document.getElementById('manualCheckinBtn').onclick = () => {
    const name = document.getElementById('manualName').value.trim();
    const errEl = document.getElementById('checkinError');
    if (!name) {
      errEl.innerHTML = '<div class="error-note">Enter your name to check in.</div>';
      return;
    }
    doCheckIn(name);
  };
}

async function doCheckIn(name) {
  const card = document.getElementById('cardArea');
  try {
    await checkIn(name);
    const firstName = name.trim().split(' ')[0];
    card.innerHTML = `
      <div class="confirm-icon">✓</div>
      <h2 style="text-align:center;">You're checked in, ${firstName}</h2>
      <p style="text-align:center; color:var(--ink-soft);">Have a seat — someone will be with you shortly.</p>
      <button class="ghost" id="doneBtn">Done</button>
    `;
    document.getElementById('doneBtn').onclick = () => renderPatientView();
    setTimeout(() => { if (currentTab === 'patient') renderPatientView(); }, 8000);
  } catch (e) {
    card.innerHTML = `<div class="error-note">${e.message || 'Could not check in. Please tell the front desk.'}</div>`;
    setTimeout(() => { if (currentTab === 'patient') renderPatientView(); }, 3000);
  }
}

async function renderStaffView() {
  const card = document.getElementById('cardArea');
  const hadContent = card.querySelector('#arrivedList');
  if (!hadContent) card.innerHTML = '<h2>Arrived today</h2><div id="arrivedList"></div><div class="refresh-note">Updates automatically every 15 seconds</div>';
  const bookings = await getTodayBookings();
  const arrived = bookings.filter(b => b.arrivedAt).sort((a, b) => new Date(a.arrivedAt) - new Date(b.arrivedAt));
  const list = document.getElementById('arrivedList');
  if (arrived.length === 0) {
    list.innerHTML = '<div class="empty-state">No one has checked in yet.</div>';
    return;
  }
  list.innerHTML = arrived.map(b => {
    const mins = Math.round((Date.now() - new Date(b.arrivedAt).getTime()) / 60000);
    const waitClass = mins >= 20 ? 'wait-long' : 'wait-ok';
    return `
      <div class="arrived-row">
        <div>
          <div class="name">${b.name}</div>
          <div class="meta">${b.walkIn ? 'Walk-in' : 'Appointment ' + b.time}</div>
        </div>
        <span class="wait-badge ${waitClass}">waiting ${formatWait(b.arrivedAt)}</span>
      </div>
    `;
  }).join('');
}

switchTab('patient');
</script>
</body>
</html>
