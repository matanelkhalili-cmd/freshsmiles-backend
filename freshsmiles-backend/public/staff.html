<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Smiles Dental — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F8F6;
    --card: #FFFFFF;
    --ink: #14261F;
    --ink-soft: #4B5D55;
    --teal: #167567;
    --teal-light: #E3F0EA;
    --gold: #D9A441;
    --border: #DCE4DF;
    --amber: #B3791F;
    --amber-light: #FBF0DA;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; padding: 32px 16px 64px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 8px; }
  header img.logo { width: 72px; height: 72px; object-fit: contain; margin-bottom: 8px; }
  header .eyebrow { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--teal); font-weight: 600; margin-bottom: 6px; }
  header h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 28px; margin: 0 0 8px; }
  .home-link { text-align: center; margin-bottom: 24px; }
  .home-link a { color: var(--ink-soft); font-size: 13px; text-decoration: underline; }

  .tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 24px; background: var(--teal-light); border-radius: 12px; padding: 4px; max-width: 560px; margin-left: auto; margin-right: auto; }
  .tab { flex: 1; text-align: center; padding: 10px 4px; border-radius: 9px; cursor: pointer; font-weight: 600; font-size: 12px; color: var(--ink-soft); }
  .tab.active { background: white; color: var(--teal); }
  .tab .count { display: inline-block; margin-left: 4px; opacity: 0.7; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .card h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 18px; margin: 0 0 16px; }

  label { display: block; font-size: 13px; font-weight: 500; margin: 16px 0 6px; color: var(--ink-soft); }
  label:first-of-type { margin-top: 0; }
  input[type=text], input[type=tel], input[type=email], input[type=number], select {
    width: 100%; padding: 11px 12px; border-radius: 10px; border: 1.5px solid var(--border);
    font-family: 'Inter', sans-serif; font-size: 15px; color: var(--ink);
  }
  input:focus, select:focus { outline: none; border-color: var(--teal); }
  .amount-input { position: relative; }
  .amount-input span { position: absolute; left: 12px; top: 11px; color: var(--ink-soft); }
  .amount-input input { padding-left: 26px; }

  button.primary { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; padding: 12px 22px; border-radius: 10px; cursor: pointer; border: none; background: var(--gold); color: #3A2A08; width: 100%; margin-top: 20px; }
  button.primary:hover { background: #A9791F; }
  button.ghost { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; padding: 8px 14px; border-radius: 8px; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--ink-soft); }
  .error-note { font-size: 13px; color: #B3432F; margin-top: 12px; padding: 10px 14px; background: #FBEAE7; border-radius: 10px; }

  .row { border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; }
  .row-top { display: flex; justify-content: space-between; align-items: center; }
  .row .name { font-weight: 600; font-size: 15px; }
  .row .meta { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
  .badge.unpaid { background: var(--amber-light); color: var(--amber); }
  .badge.paid { background: var(--teal-light); color: var(--teal); }
  .badge.insurance-not_billed { background: var(--border); color: var(--ink-soft); }
  .badge.insurance-pending { background: var(--amber-light); color: var(--amber); }
  .badge.insurance-paid { background: var(--teal-light); color: var(--teal); }
  .badge.insurance-denied { background: #FBEAE7; color: #B3432F; }
  .insurance-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .insurance-select { font-size: 12px; padding: 4px 8px; border-radius: 8px; border: 1.5px solid var(--border); font-family: 'Inter', sans-serif; width: auto; }
  .wait-ok { background: var(--teal-light); color: var(--teal); }
  .wait-long { background: var(--amber-light); color: var(--amber); }

  .empty-state { text-align: center; color: var(--ink-soft); padding: 24px; font-size: 14px; }
  .refresh-note { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="logo" src="logo.png" alt="Fresh Smiles Dental logo">
    <div class="eyebrow">Fresh Smiles Dental</div>
    <h1>Staff dashboard</h1>
  </header>
  <div class="home-link"><a href="index.html">← Back to home</a></div>

  <div class="tabs">
    <div class="tab active" id="tabBookings">Upcoming<span class="count" id="countBookings"></span></div>
    <div class="tab" id="tabArrived">Arrived<span class="count" id="countArrived"></span></div>
    <div class="tab" id="tabBalances">Balances<span class="count" id="countBalances"></span></div>
    <div class="tab" id="tabPatients">Patients<span class="count" id="countPatients"></span></div>
  </div>

  <div class="card" id="cardArea"></div>
</div>

<script>
const API_BASE = window.location.origin;
let currentTab = 'bookings';
let refreshInterval = null;

const ACCEPTED_INSURANCES = [
  'Delta Dental', 'Aetna', 'Blue Cross Blue Shield', 'UnitedHealthcare',
  'Dentaquest', 'Metroplus', 'Emblem', 'Cigna', 'MetLife', 'Guardian',
  'Humana', 'Fidelis', 'Healthy', 'Sids'
];

function renderInsuranceProviderField(selectId, otherId, currentValue) {
  const knownMatch = currentValue && ACCEPTED_INSURANCES.includes(currentValue);
  const isOtherValue = currentValue && !knownMatch;
  const options = ACCEPTED_INSURANCES.map(name =>
    `<option value="${name}" ${currentValue === name ? 'selected' : ''}>${name}</option>`
  ).join('');
  return `
    <select id="${selectId}">
      <option value="">Select insurance...</option>
      ${options}
      <option value="__other__" ${isOtherValue ? 'selected' : ''}>Other</option>
    </select>
    <input type="text" id="${otherId}" placeholder="Enter insurance name" value="${isOtherValue ? currentValue : ''}" style="margin-top:8px; ${isOtherValue ? '' : 'display:none;'}">
  `;
}

function wireInsuranceProviderField(selectId, otherId) {
  const select = document.getElementById(selectId);
  const other = document.getElementById(otherId);
  select.onchange = () => {
    other.style.display = select.value === '__other__' ? 'block' : 'none';
  };
}

function getInsuranceProviderValue(selectId, otherId) {
  const select = document.getElementById(selectId);
  const other = document.getElementById(otherId);
  if (select.value === '__other__') return other.value.trim();
  return select.value;
}

async function createInvoice(name, phone, email, amount, insuranceProvider, insuranceMemberId, insuranceGroupNumber, insuranceNotes) {
  const res = await fetch(`${API_BASE}/api/invoices`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, phone, email, amount, insuranceProvider, insuranceMemberId, insuranceGroupNumber, insuranceNotes })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Could not create balance.');
  return data;
}

async function updateInsuranceStatus(id, status) {
  const res = await fetch(`${API_BASE}/api/invoices/${id}/insurance-status`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Could not update insurance status.');
  return data;
}

async function updateInsuranceDetails(id, insuranceProvider, insuranceMemberId, insuranceGroupNumber, insuranceNotes) {
  const res = await fetch(`${API_BASE}/api/invoices/${id}/insurance`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ insuranceProvider, insuranceMemberId, insuranceGroupNumber, insuranceNotes })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Could not update insurance details.');
  return data;
}

let bookingsFetchFailed = false;
let invoicesFetchFailed = false;

async function fetchBookings() {
  try {
    const res = await fetch(`${API_BASE}/api/bookings`);
    if (!res.ok) throw new Error('backend error');
    bookingsFetchFailed = false;
    return await res.json();
  } catch (e) {
    bookingsFetchFailed = true;
    return [];
  }
}

// Used only by the Patients directory — staff should still be able to find
// someone's contact info and insurance even if their appointment was cancelled.
async function fetchAllBookingsIncludingCancelled() {
  try {
    const res = await fetch(`${API_BASE}/api/bookings?includeCancelled=true`);
    if (!res.ok) throw new Error('backend error');
    bookingsFetchFailed = false;
    return await res.json();
  } catch (e) {
    bookingsFetchFailed = true;
    return [];
  }
}

async function fetchInvoices() {
  try {
    const res = await fetch(`${API_BASE}/api/invoices`);
    if (!res.ok) throw new Error('backend error');
    invoicesFetchFailed = false;
    return await res.json();
  } catch (e) {
    invoicesFetchFailed = true;
    return [];
  }
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatWait(arrivedAt) {
  const mins = Math.max(0, Math.round((Date.now() - new Date(arrivedAt).getTime()) / 60000));
  if (mins < 60) return mins + 'm';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + 'h ' + m + 'm';
}

function formatMoney(n) {
  return Number(n).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabBookings').classList.toggle('active', tab === 'bookings');
  document.getElementById('tabArrived').classList.toggle('active', tab === 'arrived');
  document.getElementById('tabBalances').classList.toggle('active', tab === 'balances');
  document.getElementById('tabPatients').classList.toggle('active', tab === 'patients');
  if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
  render();
  if (tab === 'arrived') {
    refreshInterval = setInterval(render, 15000);
  }
}
document.getElementById('tabBookings').onclick = () => switchTab('bookings');
document.getElementById('tabArrived').onclick = () => switchTab('arrived');
document.getElementById('tabBalances').onclick = () => switchTab('balances');
document.getElementById('tabPatients').onclick = () => switchTab('patients');

async function render() {
  const card = document.getElementById('cardArea');

  if (currentTab === 'bookings') {
    const bookings = await fetchBookings();
    const today = todayKey();
    const upcoming = bookings.filter(b => b.date >= today && !b.walkIn).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
    document.getElementById('countBookings').textContent = upcoming.length ? ' (' + upcoming.length + ')' : '';
    card.innerHTML = '<h2>Upcoming appointments</h2><div id="list"></div>';
    const list = document.getElementById('list');
    if (upcoming.length === 0) {
      list.innerHTML = bookingsFetchFailed
        ? '<div class="empty-state">Couldn\'t reach the server right now — try refreshing.</div>'
        : '<div class="empty-state">No upcoming appointments.</div>';
    } else {
      list.innerHTML = upcoming.map(b => `
        <div class="row">
          <div class="row-top">
            <div>
              <div class="name">${b.name}</div>
              <div class="meta">${formatDateLabel(b.date)} · ${b.time} · ${b.phone || 'no phone'}</div>
              ${b.reason ? `<div class="meta">reason: ${b.reason}</div>` : ''}
              ${b.insuranceProvider ? `<div class="meta">${b.insuranceProvider}${b.insuranceMemberId ? ' · ' + b.insuranceMemberId : ''}</div>` : ''}
            </div>
            ${b.arrivedAt ? '<span class="badge paid">arrived</span>' : ''}
          </div>
        </div>
      `).join('');
    }
  }

  else if (currentTab === 'arrived') {
    const bookings = await fetchBookings();
    const today = todayKey();
    const arrived = bookings.filter(b => b.date === today && b.arrivedAt).sort((a, b) => new Date(a.arrivedAt) - new Date(b.arrivedAt));
    document.getElementById('countArrived').textContent = arrived.length ? ' (' + arrived.length + ')' : '';
    card.innerHTML = '<h2>Arrived today</h2><div id="list"></div><div class="refresh-note">Updates automatically every 15 seconds</div>';
    const list = document.getElementById('list');
    if (arrived.length === 0) {
      list.innerHTML = bookingsFetchFailed
        ? '<div class="empty-state">Couldn\'t reach the server right now — try refreshing.</div>'
        : '<div class="empty-state">No one has checked in yet.</div>';
    } else {
      list.innerHTML = arrived.map(b => {
        const mins = Math.round((Date.now() - new Date(b.arrivedAt).getTime()) / 60000);
        const waitClass = mins >= 20 ? 'wait-long' : 'wait-ok';
        return `
          <div class="row">
            <div class="row-top">
              <div>
                <div class="name">${b.name}</div>
                <div class="meta">${b.walkIn ? 'Walk-in' : 'Appointment ' + b.time}</div>
              </div>
              <span class="badge ${waitClass}">waiting ${formatWait(b.arrivedAt)}</span>
            </div>
          </div>
        `;
      }).join('');
    }
  }

  else if (currentTab === 'balances') {
    const invoices = await fetchInvoices();
    const unpaidCount = invoices.filter(i => i.status === 'unpaid').length;
    document.getElementById('countBalances').textContent = unpaidCount ? ' (' + unpaidCount + ')' : '';
    card.innerHTML = `
      <h2>Create a balance</h2>
      <label for="pName">Patient name</label>
      <input type="text" id="pName" placeholder="Jane Rivera">
      <label for="pPhone">Phone</label>
      <input type="tel" id="pPhone" placeholder="(347) 555-0134">
      <label for="pEmail">Email (optional — for a payment receipt)</label>
      <input type="email" id="pEmail" placeholder="jane@email.com">
      <label for="pInsuranceProvider">Insurance provider (optional)</label>
      <div id="pInsuranceProviderField"></div>
      <label for="pInsuranceMemberId">Insurance member ID (optional)</label>
      <input type="text" id="pInsuranceMemberId" placeholder="DD-123456">
      <label for="pInsuranceGroupNumber">Insurance group number (optional)</label>
      <input type="text" id="pInsuranceGroupNumber" placeholder="GRP-789">
      <label for="pInsuranceNotes">Insurance notes (optional)</label>
      <input type="text" id="pInsuranceNotes" placeholder="e.g. requires pre-authorization">
      <label for="pAmount">Amount owed</label>
      <div class="amount-input"><span>$</span><input type="number" id="pAmount" placeholder="0.00" step="0.01" min="0"></div>
      <button class="primary" id="createBtn">Create balance</button>
      <div id="createError"></div>
      <h2 style="margin-top:32px;">All balances</h2>
      <div id="list"></div>
    `;
    document.getElementById('pInsuranceProviderField').innerHTML =
      renderInsuranceProviderField('pInsuranceProvider', 'pInsuranceProviderOther', '');
    wireInsuranceProviderField('pInsuranceProvider', 'pInsuranceProviderOther');

    const list = document.getElementById('list');
    if (invoices.length === 0) {
      list.innerHTML = invoicesFetchFailed
        ? '<div class="empty-state">Couldn\'t reach the server right now — try refreshing.</div>'
        : '<div class="empty-state">No balances created yet.</div>';
    } else {
      const sorted = [...invoices].sort((a, b) => {
        if (a.status !== b.status) return a.status === 'unpaid' ? -1 : 1;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });
      list.innerHTML = sorted.map(inv => `
        <div class="row">
          <div class="row-top">
            <div>
              <div class="name">${inv.name}</div>
              <div class="meta">${inv.id} ${inv.phone ? '· ' + inv.phone : ''}</div>
              ${inv.insuranceProvider ? `<div class="meta">${inv.insuranceProvider}${inv.insuranceMemberId ? ' · ' + inv.insuranceMemberId : ''}${inv.insuranceGroupNumber ? ' · grp ' + inv.insuranceGroupNumber : ''}</div>` : ''}
              ${inv.insuranceNotes ? `<div class="meta">note: ${inv.insuranceNotes}</div>` : ''}
            </div>
            <div style="text-align:right;">
              <div class="name">${formatMoney(inv.amount)}</div>
              <span class="badge ${inv.status}">${inv.status}</span>
            </div>
          </div>
          ${inv.insuranceProvider ? `
            <div class="insurance-row">
              <span class="badge insurance-${inv.insuranceStatus}">insurance: ${inv.insuranceStatus.replace('_', ' ')}</span>
              <select class="insurance-select" data-invoice-id="${inv.id}">
                <option value="not_billed" ${inv.insuranceStatus === 'not_billed' ? 'selected' : ''}>Not billed</option>
                <option value="pending" ${inv.insuranceStatus === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="paid" ${inv.insuranceStatus === 'paid' ? 'selected' : ''}>Insurance paid</option>
                <option value="denied" ${inv.insuranceStatus === 'denied' ? 'selected' : ''}>Denied</option>
              </select>
            </div>
          ` : ''}
          <div class="insurance-row">
            <button class="ghost edit-insurance-btn" data-invoice-id="${inv.id}" style="font-size:12px; padding:6px 10px;">${inv.insuranceProvider ? 'Edit insurance' : 'Add insurance'}</button>
          </div>
          <div class="insurance-edit-form" id="insEdit-${inv.id}" style="display:none; margin-top:10px;">
            <label style="font-size:12px;">Provider</label>
            <div id="insEditProviderField-${inv.id}"></div>
            <label style="font-size:12px;">Member ID</label>
            <input type="text" class="ins-edit-member" data-invoice-id="${inv.id}" value="${inv.insuranceMemberId || ''}" placeholder="DD-123456">
            <label style="font-size:12px;">Group number</label>
            <input type="text" class="ins-edit-group" data-invoice-id="${inv.id}" value="${inv.insuranceGroupNumber || ''}" placeholder="GRP-789">
            <label style="font-size:12px;">Notes</label>
            <input type="text" class="ins-edit-notes" data-invoice-id="${inv.id}" value="${inv.insuranceNotes || ''}" placeholder="Notes">
            <button class="primary save-insurance-btn" data-invoice-id="${inv.id}" style="padding:8px 14px; font-size:13px;">Save insurance</button>
          </div>
        </div>
      `).join('');

      invoices.forEach(inv => {
        const fieldEl = document.getElementById(`insEditProviderField-${inv.id}`);
        if (fieldEl) {
          fieldEl.innerHTML = renderInsuranceProviderField(
            `insEditProvider-${inv.id}`, `insEditProviderOther-${inv.id}`, inv.insuranceProvider || ''
          );
          wireInsuranceProviderField(`insEditProvider-${inv.id}`, `insEditProviderOther-${inv.id}`);
        }
      });

      list.querySelectorAll('.insurance-select').forEach(select => {
        select.onchange = async () => {
          const id = select.getAttribute('data-invoice-id');
          try {
            await updateInsuranceStatus(id, select.value);
            render();
          } catch (e) {
            alert(e.message || 'Could not update insurance status.');
            render();
          }
        };
      });

      list.querySelectorAll('.edit-insurance-btn').forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute('data-invoice-id');
          const form = document.getElementById('insEdit-' + id);
          form.style.display = form.style.display === 'none' ? 'block' : 'none';
        };
      });

      list.querySelectorAll('.save-insurance-btn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-invoice-id');
          const provider = getInsuranceProviderValue(`insEditProvider-${id}`, `insEditProviderOther-${id}`);
          const member = list.querySelector(`.ins-edit-member[data-invoice-id="${id}"]`).value.trim();
          const group = list.querySelector(`.ins-edit-group[data-invoice-id="${id}"]`).value.trim();
          const notes = list.querySelector(`.ins-edit-notes[data-invoice-id="${id}"]`).value.trim();
          try {
            await updateInsuranceDetails(id, provider, member, group, notes);
            render();
          } catch (e) {
            alert(e.message || 'Could not update insurance details.');
            render();
          }
        };
      });
    }

    document.getElementById('createBtn').onclick = async () => {
      const name = document.getElementById('pName').value.trim();
      const phone = document.getElementById('pPhone').value.trim();
      const email = document.getElementById('pEmail').value.trim();
      const insuranceProvider = getInsuranceProviderValue('pInsuranceProvider', 'pInsuranceProviderOther');
      const insuranceMemberId = document.getElementById('pInsuranceMemberId').value.trim();
      const insuranceGroupNumber = document.getElementById('pInsuranceGroupNumber').value.trim();
      const insuranceNotes = document.getElementById('pInsuranceNotes').value.trim();
      const amount = parseFloat(document.getElementById('pAmount').value);
      const errEl = document.getElementById('createError');
      if (!name || !amount || amount <= 0) {
        errEl.innerHTML = '<div class="error-note">Enter a patient name and an amount greater than $0.</div>';
        return;
      }
      try {
        await createInvoice(name, phone, email, amount, insuranceProvider, insuranceMemberId, insuranceGroupNumber, insuranceNotes);
        render();
      } catch (e) {
        errEl.innerHTML = '<div class="error-note">' + (e.message || 'Could not create balance.') + '</div>';
      }
    };
  }

  else if (currentTab === 'patients') {
    const [bookings, invoices] = await Promise.all([fetchAllBookingsIncludingCancelled(), fetchInvoices()]);
    const byPhone = {};
    bookings.forEach(b => {
      if (!b.phone) return;
      byPhone[b.phone] = {
        name: b.name, phone: b.phone, email: b.email || '',
        insuranceProvider: b.insuranceProvider || '', insuranceMemberId: b.insuranceMemberId || '',
        insuranceGroupNumber: '', insuranceNotes: ''
      };
    });
    invoices.forEach(inv => {
      if (!inv.phone) return;
      const existing = byPhone[inv.phone] || { name: inv.name, phone: inv.phone };
      byPhone[inv.phone] = {
        ...existing,
        name: inv.name || existing.name,
        email: inv.email || existing.email || '',
        insuranceProvider: inv.insuranceProvider || existing.insuranceProvider || '',
        insuranceMemberId: inv.insuranceMemberId || existing.insuranceMemberId || '',
        insuranceGroupNumber: inv.insuranceGroupNumber || '',
        insuranceNotes: inv.insuranceNotes || ''
      };
    });
    const patients = Object.values(byPhone).sort((a, b) => a.name.localeCompare(b.name));
    document.getElementById('countPatients').textContent = patients.length ? ' (' + patients.length + ')' : '';
    card.innerHTML = `
      <h2>Patients</h2>
      <input type="text" id="patientSearch" placeholder="Search by name or phone" style="width:100%; padding:10px 12px; border-radius:10px; border:1.5px solid var(--border); margin-bottom:16px; font-family:'Inter',sans-serif; font-size:14px;">
      <div id="list"></div>
    `;
    const list = document.getElementById('list');
    function renderPatientList(filter) {
      const f = (filter || '').toLowerCase();
      const filtered = patients.filter(p => p.name.toLowerCase().includes(f) || p.phone.includes(f));
      if (filtered.length === 0) {
        list.innerHTML = (bookingsFetchFailed || invoicesFetchFailed)
          ? '<div class="empty-state">Couldn\'t reach the server right now — try refreshing.</div>'
          : '<div class="empty-state">No patients found.</div>';
        return;
      }
      list.innerHTML = filtered.map(p => `
        <div class="row">
          <div class="name">${p.name}</div>
          <div class="meta">${p.phone}${p.email ? ' · ' + p.email : ''}</div>
          ${p.insuranceProvider ? `
            <div class="meta" style="margin-top:6px;">
              <strong>${p.insuranceProvider}</strong>${p.insuranceMemberId ? ' · ' + p.insuranceMemberId : ''}${p.insuranceGroupNumber ? ' · grp ' + p.insuranceGroupNumber : ''}
            </div>
            ${p.insuranceNotes ? `<div class="meta">note: ${p.insuranceNotes}</div>` : ''}
          ` : '<div class="meta">No insurance on file</div>'}
        </div>
      `).join('');
    }
    renderPatientList('');
    document.getElementById('patientSearch').oninput = (e) => renderPatientList(e.target.value);
  }
}

render();
</script>
</body>
</html>
